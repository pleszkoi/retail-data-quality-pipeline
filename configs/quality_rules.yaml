customers:
  required_columns:
    - column: customer_id
      severity: ERROR
    - column: full_name
      severity: ERROR
    - column: country
      severity: ERROR

  unique_columns:
    - column: customer_id
      severity: ERROR

  date_columns:
    - column: registration_date
      severity: ERROR

  email_columns:
    - column: email
      severity: WARNING

products:
  required_columns:
    - column: product_id
      severity: ERROR
    - column: product_name
      severity: ERROR
    - column: category
      severity: ERROR

  unique_columns:
    - column: product_id
      severity: ERROR

  numeric_rules:
    - column: price
      min_value: 0
      severity: ERROR

orders:
  required_columns:
    - column: order_id
      severity: ERROR
    - column: customer_id
      severity: ERROR
    - column: product_id
      severity: ERROR

  unique_columns:
    - column: order_id
      severity: ERROR

  date_columns:
    - column: order_date
      severity: ERROR

  numeric_rules:
    - column: quantity
      min_value: 1
      severity: ERROR
    - column: total_amount
      min_value: 0
      severity: ERROR

  foreign_keys:
    - column: customer_id
      reference_dataset: customers
      reference_column: customer_id
      severity: ERROR
    - column: product_id
      reference_dataset: products
      reference_column: product_id
      severity: ERROR
